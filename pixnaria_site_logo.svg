<svg width="760" height="164" viewBox="0 0 760 164" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pixnaria site logo</title>
  <desc id="desc">Horizontal Pixnaria logo for the website header, inspired by playful platform logos but with modern dark violet neon style.</desc>

  <defs>
    <radialGradient id="iconBg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#2D0B59"/>
      <stop offset="52%" stop-color="#110A1F"/>
      <stop offset="100%" stop-color="#05030A"/>
    </radialGradient>

    <linearGradient id="stroke" x1="35" y1="22" x2="138" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0ABFC"/>
      <stop offset="0.24" stop-color="#C084FC"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="0.82" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#D946EF"/>
    </linearGradient>

    <linearGradient id="node" x1="20" y1="20" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D946EF"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="word" x1="184" y1="44" x2="650" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.34" stop-color="#F5F3FF"/>
      <stop offset="0.72" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.68  0 1 0 0 0.18  0 0 1 0 1.00  0 0 0 0.88 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-30%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="17" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Transparent background for easy website integration -->

  <g filter="url(#shadow)">
    <rect x="14" y="14" width="136" height="136" rx="36" fill="url(#iconBg)"/>
    <rect x="15" y="15" width="134" height="134" rx="35" stroke="#2D1B46" stroke-width="2" opacity="0.9"/>
  </g>

  <g filter="url(#glow)">
    <!-- compact Pixnaria mark -->
    <path d="M61 46 C61 35 70 27 84 27 H108 C128 27 143 41 143 60 C143 80 128 94 108 94 H86" stroke="url(#stroke)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M61 46 V129" stroke="url(#stroke)" stroke-width="12" stroke-linecap="round"/>
    <path d="M86 94 L129 137" stroke="url(#stroke)" stroke-width="9" stroke-linecap="round" opacity="0.96"/>

    <rect x="89" y="45" width="17" height="17" rx="5" fill="#F5F3FF"/>
    <rect x="112" y="45" width="17" height="17" rx="5" fill="#A855F7"/>
    <rect x="89" y="68" width="17" height="17" rx="5" fill="#7C3AED"/>

    <path d="M30 42 L61 46 L98 53" stroke="url(#node)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    <path d="M61 129 L36 145 L22 119" stroke="url(#node)" stroke-width="3" stroke-linecap="round" opacity="0.74"/>
    <path d="M129 137 L154 113 L143 60" stroke="url(#node)" stroke-width="3" stroke-linecap="round" opacity="0.65"/>

    <circle cx="30" cy="42" r="7" fill="#0B0712" stroke="#D946EF" stroke-width="3"/>
    <circle cx="36" cy="145" r="7" fill="#0B0712" stroke="#8B5CF6" stroke-width="3"/>
    <circle cx="22" cy="119" r="5" fill="#0B0712" stroke="#38BDF8" stroke-width="2.5"/>
    <circle cx="154" cy="113" r="6" fill="#0B0712" stroke="#D946EF" stroke-width="2.5"/>
  </g>

  <!-- Wordmark: friendly but modern, like a platform header logo -->
  <g>
    <text x="184" y="99" font-family="Inter, Sora, Montserrat, Arial, sans-serif" font-size="72" font-weight="850" letter-spacing="-3.2" fill="url(#word)">Pixnaria</text>
    <circle cx="664" cy="78" r="6" fill="#D946EF" filter="url(#glow)"/>
    <circle cx="687" cy="78" r="6" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="710" cy="78" r="6" fill="#38BDF8" filter="url(#glow)"/>
    <text x="188" y="127" font-family="Inter, Sora, Montserrat, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4.2" fill="#AFA7C8">IMAGINE · CREATE · SHARE</text>
  </g>
</svg>