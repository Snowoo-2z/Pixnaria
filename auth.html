<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Pixnaria</title>
  <link rel="icon" href="assets/logos/pixnaria_favicon.ico">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/responsive.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body data-auth-page>
  <header class="site-header">
    <div class="container navbar">
      <div class="navbar__left">
        <a class="logo-link" href="index.html"><img src="assets/logos/pixnaria_site_logo.svg" alt="Pixnaria"></a>
        <nav class="navbar__links"><a class="nav-link" href="explore.html">Explorer</a></nav>
      </div>
      <div class="navbar__right">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="projects.html">Projects</a>
      </div>
    </div>
  </header>

  <main class="auth-page auth-page--clean">
    <div class="container auth-clean-layout">
      <section class="auth-clean-hero">
        <img src="assets/logos/pixnaria_site_logo.svg" alt="Pixnaria">
        <h1><span class="gradient-text">Sign in to Pixnaria</span></h1>
        <p>Use your GitHub account to create public Pixnaria projects, sync repositories and access the editor.</p>
      </section>

      <section class="auth-clean-card">
        <div class="auth-status" data-auth-status>Checking session…</div>
        <button class="button button--primary auth-github-button" type="button" data-github-connect>
          <span>GitHub</span>
          Continue with GitHub
        </button>
        <p class="auth-hint">Your Pixnaria profile picture and description are edited on your profile page.</p>
        <div class="auth-footer-actions">
          <button class="button button--ghost" type="button" data-reset-auth>Logout</button>
          <a class="button button--ghost" href="privacy.html">Privacy</a>
        </div>
      </section>
    </div>
  </main>

  <script src="scripts/mock-data.js"></script>
  <script src="scripts/i18n.js"></script>
  <script src="scripts/navigation.js"></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
